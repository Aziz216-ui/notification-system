<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - Order Tracking</title>
    <!-- Add Bootstrap CSS and Font Awesome for icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        .update {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .update i {
            margin-right: 10px;
            font-size: 24px;
        }
        .status-label {
            font-weight: bold;
        }
        .status-buttons button {
            margin-right: 10px;
        }
        .status-buttons button:hover {
            opacity: 0.9;
        }
        .progress-bar-container {
            margin-top: 10px;
        }
        .icon {
            margin-right: 10px;
        }
        .prepared {
            color: #ff9900;
        }
        .ready {
            color: #f0ad4e;
        }
        .delivered {
            color: #5cb85c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center">User - Order Tracking</h1>

    <!-- Formulaire pour entrer l'Order ID -->
    <div class="mb-3">
        <label for="orderIdInput" class="form-label"><strong>Entrez votre Order ID :</strong></label>
        <div class="input-group">
            <input type="text" class="form-control" id="orderIdInput" placeholder="Ex: ORD001">
            <button class="btn btn-primary" type="button" id="subscribeBtn">S'abonner</button>
        </div>
        <small class="text-muted" id="statusMessage"></small>
    </div>

    <div id="orderUpdates"></div>
</div>

<script>
    let stompClient = null;
    let currentOrderId = null;

    function connectWebSocket() {
        const socket = new SockJS('http://localhost:8086/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            console.log("Connected to WebSocket");
            document.getElementById('statusMessage').textContent = 'Connecté ✓';
            document.getElementById('statusMessage').style.color = 'green';
        }, function (error) {
            console.error("WebSocket connection error: " + error);
            document.getElementById('statusMessage').textContent = 'Erreur de connexion ✗';
            document.getElementById('statusMessage').style.color = 'red';
        });
    }

    // Bouton S'abonner
    document.getElementById('subscribeBtn').addEventListener('click', function () {
        const orderIdInput = document.getElementById('orderIdInput').value.trim();

        if (!orderIdInput) {
            alert('Veuillez entrer un Order ID');
            return;
        }

        currentOrderId = orderIdInput;
        document.getElementById('orderUpdates').innerHTML = '';
        document.getElementById('statusMessage').textContent = `En attente des mises à jour pour ${orderIdInput}...`;
        document.getElementById('statusMessage').style.color = 'blue';

        // Si pas encore connecté, se connecter
        if (!stompClient || !stompClient.connected) {
            connectWebSocket();
            setTimeout(() => subscribeToOrder(), 1000);
        } else {
            subscribeToOrder();
        }
    });

    function subscribeToOrder() {
        if (stompClient && stompClient.connected) {
            stompClient.subscribe('/topic/order', function (message) {
                const orderUpdate = JSON.parse(message.body);

                // Filtrer par Order ID - afficher uniquement les mises à jour pour cet Order
                if (orderUpdate.orderId !== currentOrderId) {
                    return;
                }

                // Display the order update in the UI with an icon based on the status
                const updatesDiv = document.getElementById('orderUpdates');
                const updateElement = document.createElement('div');
                updateElement.className = 'update';

                // Create an icon based on the status
                let icon = '';
                let progressBarClass = '';
                let progressValue = 0;

                if (orderUpdate.status === 'Prepared') {
                    icon = '<i class="fas fa-utensils icon prepared"></i>';
                    progressBarClass = 'progress-bar-striped bg-warning';
                    progressValue = 33;  // Prepared: 33%
                } else if (orderUpdate.status === 'Ready') {
                    icon = '<i class="fas fa-check-circle icon ready"></i>';
                    progressBarClass = 'progress-bar-striped bg-info';
                    progressValue = 66;  // Ready: 66%
                } else if (orderUpdate.status === 'Delivered') {
                    icon = '<i class="fas fa-truck icon delivered"></i>';
                    progressBarClass = 'progress-bar-striped bg-success';
                    progressValue = 100;  // Delivered: 100%
                }

                updateElement.innerHTML = `
                    <div class="d-flex align-items-center">
                        ${icon}
                        <div>
                            <p class="status-label">${orderUpdate.status}</p>
                            <p>Order ID: ${orderUpdate.orderId}</p>
                        </div>
                    </div>
                    <div class="progress progress-bar-container">
                        <div class="progress-bar ${progressBarClass}" role="progressbar" style="width: ${progressValue}%" aria-valuenow="${progressValue}" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                `;

                updatesDiv.appendChild(updateElement);
            });
        }
    }

    // Connexion automatique au démarrage
    connectWebSocket();
</script>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
